name: coletor-b3

on:
  schedule:
    - cron: "0 9,15,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: instalar dependências
        run: pip install -r requirements.txt
      - name: rodar coletor
        run: python run.py
      - name: publicar JSONs
        run: |
          git config user.name "coletor-bot"
          git config user.email "coletor-bot@users.noreply.github.com"
          git add output/
          git commit -m "dados $(date -u +%FT%TZ)" || echo "sem mudanças"
          git push
